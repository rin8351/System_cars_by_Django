{% extends "carsdb/base.html" %}

{% block content %}

<h2>Delete car</h2>

<div class="form-container">
    <div class="card" style="margin-bottom: 2rem;">
        <h3>⚠️ Are you sure you want to delete this car?</h3>
        <p><strong>Name:</strong> {{ object.name }}</p>
        <p><strong>Margin:</strong> {{ object.margin }}%</p>
        <p><strong>Price:</strong> {{ object.price|floatformat:0 }} $</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group text-center" style="display: flex; gap: 1rem; justify-content: center;">
            <button class="c-button" type="submit" style="background: linear-gradient(135deg, var(--error-color), #dc2626);">
                🗑️ Yes, delete
            </button>
            <a href="{% url 'cars' %}" class="c-button" style="background: linear-gradient(135deg, var(--secondary-color), #475569); text-decoration: none;">
                ❌ Cancel
            </a>
        </div>
    </form>
</div>

{% endblock content %}
